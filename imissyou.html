<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imissyou</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .lyrics-container {
            max-width: 80%;
            padding: 20px;
            min-height: 50px;
            z-index: 10;
            position: relative;
        }

        .lyric-line {
            font-size: 1.5rem;
            text-transform: none;
            color: #ffffff;
            text-shadow: 2px 2px 12px rgba(255, 255, 255, 0.4);
            margin: 20px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            display: none;
        }

        .lyric-line.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        #next-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        #next-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transform: translateX(-50%) scale(1.1);
        }

        #next-btn:active {
            transform: translateX(-50%) scale(0.9);
        }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>

    <div id="stars"></div>

    <div class="lyrics-container">
        <div class="lyric-line">That I miss you</div>
        <div class="lyric-line">You know it's true</div>
        <div class="lyric-line">So what if i call</div>
        <div class="lyric-line">And you pick up the phone?</div>
        <div class="lyric-line">And I use this holiday</div>
        <div class="lyric-line">To make my way to your ghost</div>
    </div>

    <button id="next-btn">→</button>

    <script>
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1) + 's';
                container.appendChild(star);
            }
        }
        createStars();

        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let rocket = null;

        const colors = [
            '#ff69b4', '#ff1493', '#ff4500', '#ffd700',
            '#00ff88', '#00bfff', '#ff6b6b', '#da70d6',
            '#87ceeb', '#ffa500', '#ff00ff', '#00ffff',
            '#ffff00', '#ff4757', '#7bed9f', '#70a1ff'
        ];

        function randomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        class Rocket {
            constructor(x, targetY) {
                this.x = x;
                this.y = canvas.height;
                this.targetY = targetY;
                this.trail = [];
                this.color = randomColor();
                this.exploded = false;
            }

            update() {
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 8) this.trail.shift();

                const dy = this.targetY - this.y;
                this.y += dy * 0.06;

                if (Math.abs(dy) < 15 && !this.exploded) {
                    this.explode();
                    this.exploded = true;
                }
            }

            explode() {
                for (let i = 0; i < 40; i++) {
                    const angle = (Math.PI * 2 / 40) * i;
                    const speed = Math.random() * 5 + 2;
                    particles.push(new Particle(this.x, this.y, randomColor(), {
                        x: Math.cos(angle) * speed,
                        y: Math.sin(angle) * speed
                    }));
                }
                for (let i = 0; i < 15; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    particles.push(new Particle(this.x, this.y, '#fff', {
                        x: Math.cos(angle) * 3,
                        y: Math.sin(angle) * 3
                    }));
                }
            }

            draw() {
                ctx.save();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                for (let i = 0; i < this.trail.length - 1; i++) {
                    ctx.moveTo(this.trail[i].x, this.trail[i].y);
                    ctx.lineTo(this.trail[i+1].x, this.trail[i+1].y);
                }
                ctx.stroke();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, velocity) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = velocity.x;
                this.vy = velocity.y;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.008;
                this.gravity = 0.06;
                this.size = Math.random() * 3 + 2;
            }

            update() {
                this.vx *= 0.97;
                this.vy *= 0.97;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function launch(x, y) {
            if (rocket && !rocket.exploded) return;
            rocket = new Rocket(
                x || Math.random() * canvas.width,
                y || canvas.height * 0.2 + Math.random() * canvas.height * 0.3
            );
        }

        function animate() {
            ctx.fillStyle = 'rgba(13, 13, 13, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (rocket) {
                rocket.update();
                rocket.draw();
                if (rocket.exploded && rocket.y < 0) rocket = null;
            }

            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        setInterval(() => launch(), 3000);

        document.addEventListener('click', (e) => {
            if (e.target.id !== 'next-btn') {
                launch(e.clientX, e.clientY);
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const lines = document.querySelectorAll('.lyric-line');
        const nextBtn = document.getElementById('next-btn');
        let currentIndex = -1;

        nextBtn.addEventListener('click', () => {
            launch();

            if (currentIndex >= 0 && currentIndex < lines.length) {
                lines[currentIndex].classList.remove('active');
            }

            currentIndex++;

            if (currentIndex < lines.length) {
                lines[currentIndex].classList.add('active');

                if (currentIndex === lines.length - 1) {
                    nextBtn.innerText = "↻";
                }
            } else {
                currentIndex = 0;
                lines[currentIndex].classList.add('active');
                nextBtn.innerText = "→";
            }
        });
    </script>

</body>
</html>
